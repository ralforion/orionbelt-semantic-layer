last_verified_by: tests/integration/correctness/test_pandas_baseline.py::test_rolling_30_day_sales
sql: 'WITH "cumulative_base" AS (

  SELECT date_trunc(''day'', "Sales"."salesdate") AS "Sales Date", CAST(SUM("Sales"."salesamount") AS DECIMAL(18, 2)) AS "Total
  Sales"

  FROM "orionbelt_1"."sales" AS "Sales"

  GROUP BY date_trunc(''day'', "Sales"."salesdate")

  )

  SELECT "Sales Date" AS "Sales Date", CAST(AVG("Total Sales") OVER (ORDER BY "Sales Date" ASC ROWS BETWEEN 29 PRECEDING AND
  CURRENT ROW) AS DECIMAL(18, 0)) AS "Rolling 30 Day Sales"

  FROM cumulative_base AS "cumulative_base"

  '
