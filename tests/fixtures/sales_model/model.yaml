---
# yaml-language-server: $schema=../../../schema/obml-schema.json
version: 1.0

settings:
  defaultNumericDataType: "decimal(18, 2)"
  defaultTimezone: "Europe/Zagreb"
  allowUtcFallback: true

dataObjects:
  Customers:
    code: CUSTOMERS
    database: WAREHOUSE
    schema: PUBLIC
    synonyms: [client, buyer, purchaser]
    columns:
      Customer ID:
        code: CUSTOMER_ID
        abstractType: string
      Customer Name:
        code: NAME
        abstractType: string
      Country:
        code: COUNTRY
        abstractType: string
      Segment:
        code: SEGMENT
        abstractType: string

  Products:
    code: PRODUCTS
    database: WAREHOUSE
    schema: PUBLIC
    columns:
      Product ID:
        code: PRODUCT_ID
        abstractType: string
      Product Name:
        code: NAME
        abstractType: string
      Category:
        code: CATEGORY
        abstractType: string

  Orders:
    code: ORDERS
    database: WAREHOUSE
    schema: PUBLIC
    columns:
      Order ID:
        code: ORDER_ID
        abstractType: string
      Order Date:
        code: ORDER_DATE
        abstractType: date
      Order Customer ID:
        code: CUSTOMER_ID
        abstractType: string
      Order Product ID:
        code: PRODUCT_ID
        abstractType: string
      Quantity:
        code: QUANTITY
        abstractType: int
        numClass: additive
      Price:
        code: PRICE
        abstractType: float
        numClass: non-additive
    joins:
      - joinType: many-to-one
        joinTo: Customers
        columnsFrom:
          - Order Customer ID
        columnsTo:
          - Customer ID
      - joinType: many-to-one
        joinTo: Products
        columnsFrom:
          - Order Product ID
        columnsTo:
          - Product ID

dimensions:
  Customer Country:
    dataObject: Customers
    column: Country
    resultType: string
  Customer Segment:
    dataObject: Customers
    column: Segment
    resultType: string
  Product Name:
    dataObject: Products
    column: Product Name
    resultType: string
  Product Category:
    dataObject: Products
    column: Category
    resultType: string
  Order Date:
    dataObject: Orders
    column: Order Date
    resultType: date
    timeGrain: month

measures:
  Revenue:
    resultType: float
    aggregation: sum
    expression: '{[Orders].[Price]} * {[Orders].[Quantity]}'
    synonyms: [sales, income, turnover]

  Order Count:
    columns:
      - dataObject: Orders
        column: Order ID
    resultType: int
    aggregation: count

  Average Order Value:
    resultType: float
    aggregation: avg
    expression: '{[Orders].[Price]} * {[Orders].[Quantity]}'

  Grand Total Revenue:
    resultType: float
    aggregation: sum
    expression: '{[Orders].[Price]} * {[Orders].[Quantity]}'
    total: true

  US Revenue:
    resultType: float
    aggregation: sum
    expression: '{[Orders].[Price]} * {[Orders].[Quantity]}'
    filters:
      - column: {dataObject: Customers, column: Country}
        operator: equals
        values: [{dataType: string, valueString: "US"}]

metrics:
  Revenue per Order:
    expression: '{[Revenue]} / {[Order Count]}'

  Revenue Share:
    expression: '{[Revenue]} / {[Grand Total Revenue]}'

  US Revenue Share:
    expression: '{[US Revenue]} / {[Revenue]}'

  Running Revenue:
    type: cumulative
    measure: Revenue
    timeDimension: Order Date
    description: Running total of revenue over time

  Rolling 3m Revenue:
    type: cumulative
    measure: Revenue
    timeDimension: Order Date
    cumulativeType: sum
    window: 3
    description: 3-month rolling sum of revenue

  Revenue MoM Change:
    type: period_over_period
    expression: "{[Revenue]}"
    periodOverPeriod:
      timeDimension: Order Date
      grain: month
      offsetGrain: month
      comparison: difference
    description: Month-over-month revenue change
