version: 1.0

# OrionBelt_1 Commercial Analytics Model
# Covers: Sales, Purchases, Returns, Shipments, Client Complaints, Account Balances
# Join pattern: star-schema with CFL (Composite Fact Layer) for cross-fact queries
#   to prevent the known sales <-> shipments fan-trap.
# All YAML keys (dataObjects, columns, dimensions, measures, metrics) use
# business-friendly spaced names. Physical names live in the `code:` fields.

settings:
  # The bundled demo runs against the baked-in DuckDB seed
  # (orionbelt_1_commerce.duckdb). Pin the dialect so the UI dropdown
  # and the compiler agree on duckdb without relying on DB_VENDOR env.
  defaultDialect: duckdb
  # Numeric measures default to decimal(18, 2) — money-grade precision
  # rather than floating-point rounding noise. Individual measures can
  # still override with their own ``dataType:``.
  defaultNumericDataType: "decimal(18, 2)"
  # Naive timestamps in the demo are interpreted as Europe/Zagreb local
  # time. Queries can still override per-request via the ``timezone``
  # query parameter on /v1/query/execute. The auto-detected DuckDB
  # session TZ is Etc/UTC; setting overrideDatabaseTimezone: true
  # makes ``defaultTimezone`` win in the resolved effective TZ.
  defaultTimezone: "Europe/Zagreb"
  overrideDatabaseTimezone: true

dataObjects:
  Sales:
    code: sales
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Sales ID:
        code: salesid
        abstractType: string
        primaryKey: true
      Sales Date:
        code: salesdate
        abstractType: date
      Sales Client:
        code: salesclient
        abstractType: string
      Product:
        code: product
        abstractType: string
      Sales Employee ID:
        code: salesempid
        abstractType: string
      Sales Payment Type:
        code: salespaymenttype
        abstractType: string
      Sales Channel ID:
        code: saleschanid
        abstractType: string
      Sales Quantity:
        code: salesquantity
        abstractType: float
        numClass: additive
      Sales Amount:
        code: salesamount
        abstractType: float
        numClass: additive
    joins:
      - joinType: many-to-one
        joinTo: Clients
        columnsFrom: [Sales Client]
        columnsTo: [Client ID]
      - joinType: many-to-one
        joinTo: Products
        columnsFrom: [Product]
        columnsTo: [Product ID]
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom: [Sales Employee ID]
        columnsTo: [Employee ID]
      - joinType: many-to-one
        joinTo: Channels
        columnsFrom: [Sales Channel ID]
        columnsTo: [Channel ID]
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom: [Sales Date]
        columnsTo: [Date]

  Purchases:
    code: purchases
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Purchase ID:
        code: purchaseid
        abstractType: string
        primaryKey: true
      Purchase Date:
        code: purchasedate
        abstractType: date
      Purchase Product:
        code: purchaseproduct
        abstractType: string
      Purchase Employee ID:
        code: purchaseempid
        abstractType: string
      Purchase Supplier:
        code: purchasesupplier
        abstractType: string
      Purchase Channel ID:
        code: purchasechanid
        abstractType: string
      Purchase Quantity:
        code: purchasequantity
        abstractType: float
        numClass: additive
      Purchase Price:
        code: purchaseprice
        abstractType: float
        numClass: non-additive
      Purchase Amount:
        code: purchaseamount
        abstractType: float
        numClass: additive
    joins:
      - joinType: many-to-one
        joinTo: Products
        columnsFrom: [Purchase Product]
        columnsTo: [Product ID]
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom: [Purchase Employee ID]
        columnsTo: [Employee ID]
      - joinType: many-to-one
        joinTo: Channels
        columnsFrom: [Purchase Channel ID]
        columnsTo: [Channel ID]
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom: [Purchase Date]
        columnsTo: [Date]
      - joinType: many-to-one
        joinTo: Suppliers
        columnsFrom: [Purchase Supplier]
        columnsTo: [Supplier ID]

  Returns:
    code: returns
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Return ID:
        code: returnid
        abstractType: string
        primaryKey: true
      Return Sales ID:
        code: returnsalesid
        abstractType: string
      Return Date:
        code: returndate
        abstractType: date
      Return Employee ID:
        code: returnempid
        abstractType: string
      Return Quantity:
        code: returnquantity
        abstractType: float
        numClass: additive
      Return Amount:
        code: returnamount
        abstractType: float
        numClass: additive
    joins:
      - joinType: many-to-one
        joinTo: Sales
        columnsFrom: [Return Sales ID]
        columnsTo: [Sales ID]
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom: [Return Employee ID]
        columnsTo: [Employee ID]
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom: [Return Date]
        columnsTo: [Date]

  Shipments:
    code: shipments
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Shipment ID:
        code: shipmentid
        abstractType: string
        primaryKey: true
      Shipment Sales ID:
        code: shipmentsalesid
        abstractType: string
      Shipment Date:
        code: shipmentdate
        abstractType: date
      Shipment Employee ID:
        code: shipmentempid
        abstractType: string
      Shipment Type:
        code: shipmenttype
        abstractType: string
      Shipment Quantity:
        code: shipmentquantity
        abstractType: float
        numClass: additive
      Shipment Amount:
        code: shipmentamount
        abstractType: float
        numClass: additive
    joins:
      - joinType: many-to-one
        joinTo: Sales
        columnsFrom: [Shipment Sales ID]
        columnsTo: [Sales ID]
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom: [Shipment Employee ID]
        columnsTo: [Employee ID]
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom: [Shipment Date]
        columnsTo: [Date]

  Client Complaints:
    code: clientcomplaints
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Complaint ID:
        code: complid
        abstractType: string
        primaryKey: true
      Complaint Client ID:
        code: complclientid
        abstractType: string
      Complaint Text:
        code: compltext
        abstractType: string
    joins:
      - joinType: many-to-one
        joinTo: Clients
        columnsFrom: [Complaint Client ID]
        columnsTo: [Client ID]

  Account Balances:
    code: acctbal
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Account ID:
        code: accountid
        abstractType: string
        primaryKey: true
      IBAN:
        code: iban
        abstractType: string
      Bank ID:
        code: bankid
        abstractType: string
      Balance Amount:
        code: balanceamt
        abstractType: float
        numClass: non-additive
    joins:
      - joinType: many-to-one
        joinTo: Banks
        columnsFrom: [Bank ID]
        columnsTo: [Bank ID]

  # ── Dimension tables ──
  Clients:
    code: clients
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Client ID:
        code: clientid
        abstractType: string
        primaryKey: true
      Client Name:
        code: clientname
        abstractType: string
      Client Gender:
        code: clientgender
        abstractType: string
      Client Email:
        code: clientemail
        abstractType: string
      Client Country ID:
        code: clientcountryid
        abstractType: string
    joins:
      - joinType: many-to-one
        joinTo: Countries
        columnsFrom: [Client Country ID]
        columnsTo: [Country ID]

  Products:
    code: products
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Product ID:
        code: productid
        abstractType: string
        primaryKey: true
      Product Name:
        code: productname
        abstractType: string
      Product Category:
        code: productcat
        abstractType: string
      Product Supplier:
        code: productsuppl
        abstractType: string
      Unit Cost:
        code: unitcost
        abstractType: float
        numClass: non-additive
      Unit Price:
        code: unitprice
        abstractType: float
        numClass: non-additive
      Currency:
        code: curr
        abstractType: string
      Units In Stock:
        code: unitsinstock
        abstractType: float
        numClass: non-additive
    joins:
      - joinType: many-to-one
        joinTo: Suppliers
        columnsFrom: [Product Supplier]
        columnsTo: [Supplier ID]

  Employees:
    code: employees
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Employee ID:
        code: employeeid
        abstractType: string
        primaryKey: true
      Employee Name:
        code: employeename
        abstractType: string
      Department:
        code: department
        abstractType: string

  Channels:
    code: channels
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Channel ID:
        code: channelid
        abstractType: string
        primaryKey: true
      Channel Name:
        code: channelname
        abstractType: string

  Suppliers:
    code: suppliers
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Supplier ID:
        code: supplierid
        abstractType: string
        primaryKey: true
      Supplier Name:
        code: suppliername
        abstractType: string
      Supplier Country ID:
        code: suppliercountryid
        abstractType: string

  Countries:
    code: countries
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Country ID:
        code: countryid
        abstractType: string
        primaryKey: true
      Country Name:
        code: countryname
        abstractType: string
      Region ID:
        code: region
        abstractType: string
    joins:
      - joinType: many-to-one
        joinTo: Regions
        columnsFrom: [Region ID]
        columnsTo: [Region ID]

  Regions:
    code: regions
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Region ID:
        code: regionid
        abstractType: string
        primaryKey: true
      Region Name:
        code: regionname
        abstractType: string

  Banks:
    code: banks
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Bank ID:
        code: bankid
        abstractType: string
        primaryKey: true
      Bank Name:
        code: bankname
        abstractType: string

  Calendar:
    code: calendar
    schema: orionbelt_1
    refresh:
      mode: static
    columns:
      Date:
        code: date
        abstractType: date
        primaryKey: true
      Year Month:
        code: ym
        abstractType: string
      Weekday:
        code: weekday
        abstractType: string
      Public Holiday:
        code: publicholiday
        abstractType: string

dimensions:
  # ── Generic business dimensions (no via — compiler picks the join path
  # automatically based on which facts are in the query). For cross-fact
  # queries the validator emits MISSING_VIA hints; use the role-playing
  # variants below to silence them and pin the join path explicitly. ──
  Client Name:
    dataObject: Clients
    column: Client Name
    resultType: string
  Client Gender:
    dataObject: Clients
    column: Client Gender
    resultType: string
  Client Email:
    dataObject: Clients
    column: Client Email
    resultType: string
  Country Name:
    dataObject: Countries
    column: Country Name
    resultType: string
  Region Name:
    dataObject: Regions
    column: Region Name
    resultType: string
  Currency:
    dataObject: Products
    column: Currency
    resultType: string
  Employee Name:
    dataObject: Employees
    column: Employee Name
    resultType: string
  Department:
    dataObject: Employees
    column: Department
    resultType: string
  Channel Name:
    dataObject: Channels
    column: Channel Name
    resultType: string
  Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
  Weekday:
    dataObject: Calendar
    column: Weekday
    resultType: string
  Public Holiday:
    dataObject: Calendar
    column: Public Holiday
    resultType: string

  # ── Shared dimensions (single join path — no via needed) ──
  Bank Name:
    dataObject: Banks
    column: Bank Name
    resultType: string
  Shipment Type:
    dataObject: Shipments
    column: Shipment Type
    resultType: string
  Payment Type:
    dataObject: Sales
    column: Sales Payment Type
    resultType: string

  # ── Role-playing: Employee by fact table ──
  Sales Employee:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Sales
  Purchase Employee:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Purchases
  Return Employee:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Returns
  Shipment Employee:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Shipments

  # ── Role-playing: Department by fact table ──
  Sales Department:
    dataObject: Employees
    column: Department
    resultType: string
    via: Sales
  Purchase Department:
    dataObject: Employees
    column: Department
    resultType: string
    via: Purchases

  # ── Role-playing: Calendar by fact table ──
  Sales Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Sales
  Sales Weekday:
    dataObject: Calendar
    column: Weekday
    resultType: string
    via: Sales
  Purchase Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Purchases
  Return Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Returns
  Shipment Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Shipments

  # ── Role-playing: Channel by fact table ──
  Sales Channel:
    dataObject: Channels
    column: Channel Name
    resultType: string
    via: Sales
  Purchase Channel:
    dataObject: Channels
    column: Channel Name
    resultType: string
    via: Purchases

  # ── Time dimensions on Sales.salesdate — drive cumulative & period-over-period
  # metrics (which require a date-typed dimension with an explicit timeGrain). ──
  Sales Date:
    dataObject: Sales
    column: Sales Date
    resultType: date
    timeGrain: day
  Sales Month:
    dataObject: Sales
    column: Sales Date
    resultType: date
    timeGrain: month
  Sales Quarter:
    dataObject: Sales
    column: Sales Date
    resultType: date
    timeGrain: quarter
  Sales Year:
    dataObject: Sales
    column: Sales Date
    resultType: date
    timeGrain: year

  # ── Role-playing: Client by fact table (Clients reachable from Sales and Client Complaints) ──
  Sales Client Name:
    dataObject: Clients
    column: Client Name
    resultType: string
    via: Sales
  Sales Client Gender:
    dataObject: Clients
    column: Client Gender
    resultType: string
    via: Sales
  Complaint Client Name:
    dataObject: Clients
    column: Client Name
    resultType: string
    via: Client Complaints
  Complaint Client Gender:
    dataObject: Clients
    column: Client Gender
    resultType: string
    via: Client Complaints

  # ── Role-playing: Country/Region (reached through Clients — same fan-trap) ──
  Sales Country Name:
    dataObject: Countries
    column: Country Name
    resultType: string
    via: Sales
  Sales Region Name:
    dataObject: Regions
    column: Region Name
    resultType: string
    via: Sales
  Complaint Country Name:
    dataObject: Countries
    column: Country Name
    resultType: string
    via: Client Complaints
  Complaint Region Name:
    dataObject: Regions
    column: Region Name
    resultType: string
    via: Client Complaints

  # ── Product/Supplier — generic (default to Sales path) ──
  Product Name:
    dataObject: Products
    column: Product Name
    resultType: string
  Product Category:
    dataObject: Products
    column: Product Category
    resultType: string
  Supplier Name:
    dataObject: Suppliers
    column: Supplier Name
    resultType: string

  # ── Product/Supplier — explicit Purchases path ──
  Purchase Product Name:
    dataObject: Products
    column: Product Name
    resultType: string
    via: Purchases
  Purchase Supplier Name:
    dataObject: Suppliers
    column: Supplier Name
    resultType: string
    via: Purchases

measures:
  # Amount-typed measures: explicit decimal(18, 2) precision and
  # thousand-separated 2-decimal display. The default numeric type from
  # ``settings.defaultNumericDataType`` would already pick decimal(18, 2)
  # — keeping it on each measure makes the intent grep-able.
  Total Sales:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    columns:
      - dataObject: Sales
        column: Sales Amount
  Total Sales Quantity:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0"
    columns:
      - dataObject: Sales
        column: Sales Quantity
  Sales Order Count:
    aggregation: count_distinct
    dataType: bigint
    format: "#,##0"
    columns:
      - dataObject: Sales
        column: Sales ID
  Total Purchases:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    columns:
      - dataObject: Purchases
        column: Purchase Amount
  Total Purchase Quantity:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0"
    columns:
      - dataObject: Purchases
        column: Purchase Quantity
  Total Returns:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    columns:
      - dataObject: Returns
        column: Return Amount
  Total Return Quantity:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0"
    columns:
      - dataObject: Returns
        column: Return Quantity
  Return Count:
    aggregation: count_distinct
    dataType: bigint
    format: "#,##0"
    columns:
      - dataObject: Returns
        column: Return ID
  Total Shipments:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    columns:
      - dataObject: Shipments
        column: Shipment Amount
  Total Shipment Quantity:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0"
    columns:
      - dataObject: Shipments
        column: Shipment Quantity
  Complaint Count:
    aggregation: count_distinct
    dataType: bigint
    format: "#,##0"
    columns:
      - dataObject: Client Complaints
        column: Complaint ID
  Total Account Balance:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    columns:
      - dataObject: Account Balances
        column: Balance Amount
  Total Units In Stock:
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0"
    columns:
      - dataObject: Products
        column: Units In Stock

metrics:
  # ── Derived metrics — algebra over base measures ──
  Average Sale:
    expression: "{[Total Sales]} / NULLIF({[Sales Order Count]}, 0)"
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
  Return Rate:
    # Raw ratio (Returns / Sales) — the trailing ``%`` in ``format`` makes
    # the formatter auto-multiply by 100 at display time, so the stored
    # value stays a clean ratio (0.123) and the rendered string is
    # "12.3%". Don't multiply in the expression too, or you get
    # "1230.0%".
    expression: "{[Total Returns]} / NULLIF({[Total Sales]}, 0)"
    dataType: "decimal(18, 4)"
    format: "#,##0.0%"
  Gross Margin:
    expression: "{[Total Sales]} - {[Total Purchases]}"
    dataType: "decimal(18, 2)"
    format: "#,##0.00"

  # ── Cumulative metrics — window functions over a base measure ordered by a
  # time dimension. The time dimension must be in the query's SELECT. ──
  Cumulative Sales:
    type: cumulative
    measure: Total Sales
    timeDimension: Sales Month
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    description: Running total of monthly sales (unbounded preceding)
  Rolling 30 Day Sales:
    type: cumulative
    measure: Total Sales
    timeDimension: Sales Date
    cumulativeType: avg
    window: 30
    # Whole-dollar precision: a 30-day rolling AVG is a smoothed
    # metric where cent precision is noise (daily values typically
    # vary by hundreds), and casting to decimal(18, 2) exposes a
    # half-cent boundary where DuckDB (HALF_UP), Postgres / MySQL
    # (HALF_EVEN), and ClickHouse (engine-internal) disagree at the
    # last digit. Whole-dollar precision is deterministic across
    # every dialect and arguably more honest for the metric.
    dataType: "decimal(18, 0)"
    format: "#,##0"
    description: 30-day moving average of daily sales (whole dollars)
  MTD Sales:
    type: cumulative
    measure: Total Sales
    timeDimension: Sales Date
    grainToDate: month
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    description: Month-to-date sales (resets at each month boundary)
  YTD Sales:
    type: cumulative
    measure: Total Sales
    timeDimension: Sales Month
    grainToDate: year
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    description: Year-to-date sales (resets at each year boundary)
  Peak Daily Sales 30D:
    type: cumulative
    measure: Total Sales
    timeDimension: Sales Date
    cumulativeType: max
    window: 30
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    description: 30-day rolling maximum of daily sales

  # ── Period-over-period metrics — compare a base measure across time periods. ──
  Sales YoY Growth:
    type: period_over_period
    expression: "{[Total Sales]}"
    dataType: "decimal(18, 4)"
    format: "#,##0.0%"
    periodOverPeriod:
      timeDimension: Sales Month
      grain: month
      offset: -1
      offsetGrain: year
      comparison: percentChange
    description: Year-over-year sales growth (% change vs same month last year)
  Sales MoM Change:
    type: period_over_period
    expression: "{[Total Sales]}"
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    periodOverPeriod:
      timeDimension: Sales Month
      grain: month
      offset: -1
      offsetGrain: month
      comparison: difference
    description: Month-over-month absolute change in sales
  Sales Previous Year:
    type: period_over_period
    expression: "{[Total Sales]}"
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    periodOverPeriod:
      timeDimension: Sales Month
      grain: month
      offset: -1
      offsetGrain: year
      comparison: previousValue
    description: Sales for the same month one year ago (raw prior value)
  Sales QoQ Ratio:
    type: period_over_period
    expression: "{[Total Sales]}"
    dataType: "decimal(18, 4)"
    format: "#,##0.000"
    periodOverPeriod:
      timeDimension: Sales Quarter
      grain: quarter
      offset: -1
      offsetGrain: quarter
      comparison: ratio
    description: Quarter-over-quarter ratio of sales (current / previous)
