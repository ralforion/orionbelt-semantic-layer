# yaml-language-server: $schema=../../schema/query-schema.json
# Q31 — Store sales by customer county and year (2000-2001)

select:
  dimensions: [Year, Customer County]
  measures: [Store Sales Amount]
where:
  - {field: Year, op: in, value: [2000, 2001]}
order_by:
  - {field: Year, direction: asc}
  - {field: Store Sales Amount, direction: desc}
limit: 100
