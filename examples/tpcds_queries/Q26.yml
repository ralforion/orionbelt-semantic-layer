# yaml-language-server: $schema=../../schema/query-schema.json
# Q26 — Q7-style for F+M+College in 2000 (different demo segment)

select:
  dimensions: [Item ID]
  measures: [Store Quantity, Avg List Price, Avg Sales Price]
where:
  - {field: Year, op: "=", value: 2000}
  - {field: Gender, op: "=", value: F}
  - {field: Marital Status, op: "=", value: M}
  - {field: Education Status, op: "=", value: College}
order_by:
  - {field: Item ID, direction: asc}
limit: 100
