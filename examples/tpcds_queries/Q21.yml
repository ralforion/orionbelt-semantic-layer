# yaml-language-server: $schema=../../schema/query-schema.json
# Q21 — Inventory on hand by warehouse and item (sample 2001)

select:
  dimensions: [Warehouse Name, Item ID]
  measures: [Inventory On Hand]
where:
  - {field: Year, op: "=", value: 2001}
  - {field: Quarter of Year, op: "=", value: 1}
order_by:
  - {field: Warehouse Name, direction: asc}
  - {field: Inventory On Hand, direction: desc}
limit: 100
