# yaml-language-server: $schema=../../schema/query-schema.json
# Q88 — Per-store sales by Year-Month (computed dim, sortable on computed col)

select:
  dimensions: [Store Name, Year-Month]
  measures: [Store Sales Amount, Store Sale Count]
where:
  - {field: Year, op: in, value: [2000, 2001]}
order_by:
  - {field: Store Name, direction: asc}
  - {field: Year-Month, direction: asc}
limit: 100
