# yaml-language-server: $schema=../../schema/query-schema.json
# DEMO-Margin — Net margin & return rate by year / category (sales+returns CFL)

select:
  dimensions: [Year, Category]
  measures: [Store Sales Amount, Return Amount, Net Margin %, Return Rate %]
where:
  - {field: Year, op: "=", value: 2001}
order_by:
  - {field: Year, direction: asc}
  - {field: Category, direction: asc}
limit: 50
