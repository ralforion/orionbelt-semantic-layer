# yaml-language-server: $schema=../schema/obml-schema.json
version: 1.0

settings:
  defaultNumericDataType: "decimal(18, 2)"
  defaultTimezone: "Europe/Berlin"

dataObjects:
  # ── Dimension tables ───────────────────────────────────────────────

  Calendar:
    code: calendar
    database: postgres
    schema: orionbelt_1
    columns:
      Calendar Date:
        code: date
        abstractType: date
      Year Month:
        code: ym
        abstractType: string
      Weekday:
        code: weekday
        abstractType: string
      Public Holiday:
        code: public_holiday
        abstractType: boolean

  Countries:
    code: countries
    database: postgres
    schema: orionbelt_1
    columns:
      Country ID:
        code: country_id
        abstractType: string
      Country Name:
        code: country_name
        abstractType: string

  Clients:
    code: clients
    database: postgres
    schema: orionbelt_1
    columns:
      Client ID:
        code: client_id
        abstractType: string
      Client Name:
        code: client_name
        abstractType: string
      Client Gender:
        code: client_gender
        abstractType: string
      Client Country ID:
        code: client_country_id
        abstractType: string
    joins:
      - joinType: many-to-one
        joinTo: Countries
        columnsFrom:
          - Client Country ID
        columnsTo:
          - Country ID

  Suppliers:
    code: suppliers
    database: postgres
    schema: orionbelt_1
    columns:
      Supplier ID:
        code: supplier_id
        abstractType: string
      Supplier Name:
        code: supplier_name
        abstractType: string
      Supplier Country ID:
        code: supplier_country_id
        abstractType: string
    joins:
      # Secondary: avoids multipath diamond (Countries reachable via Clients)
      - joinType: many-to-one
        joinTo: Countries
        secondary: true
        pathName: supplier_country
        columnsFrom:
          - Supplier Country ID
        columnsTo:
          - Country ID

  Products:
    code: products
    database: postgres
    schema: orionbelt_1
    columns:
      Product ID:
        code: product_id
        abstractType: string
      Product Name:
        code: product_name
        abstractType: string
      Product Category:
        code: product_cat
        abstractType: string
      Product Supplier:
        code: product_suppl
        abstractType: string
      Unit Cost:
        code: unit_cost
        abstractType: float
        numClass: non-additive
      Unit Price:
        code: unit_price
        abstractType: float
        numClass: non-additive
    joins:
      - joinType: many-to-one
        joinTo: Suppliers
        columnsFrom:
          - Product Supplier
        columnsTo:
          - Supplier ID

  Employees:
    code: employees
    database: postgres
    schema: orionbelt_1
    columns:
      Employee ID:
        code: employee_id
        abstractType: string
      Employee Name:
        code: employee_name
        abstractType: string
      Department Name:
        code: department_name
        abstractType: string

  Account Balances:
    code: acctbal
    database: postgres
    schema: orionbelt_1
    columns:
      Account ID:
        code: account_id
        abstractType: string
      IBAN:
        code: iban
        abstractType: string
      Balance:
        code: balance
        abstractType: float
        numClass: non-additive

  # ── Fact tables ────────────────────────────────────────────────────

  Sales:
    code: sales
    database: postgres
    schema: orionbelt_1
    columns:
      Sales ID:
        code: sales_id
        abstractType: string
      Sales Date:
        code: sales_date
        abstractType: date
      Sales YM:
        code: sales_ym
        abstractType: string
      Sales Client:
        code: sales_client
        abstractType: string
      Sales Product:
        code: product
        abstractType: string
      Sales Employee:
        code: sales_emp_id
        abstractType: string
      Sales Payment Type:
        code: sales_payment_type
        abstractType: string
      Sales Quantity:
        code: sales_quantity
        abstractType: int
        numClass: additive
      Sales Amount:
        code: sales_amount
        abstractType: float
        numClass: additive
      Sales Notes:
        code: notes
        abstractType: string
    joins:
      - joinType: many-to-one
        joinTo: Clients
        columnsFrom:
          - Sales Client
        columnsTo:
          - Client ID
      - joinType: many-to-one
        joinTo: Products
        columnsFrom:
          - Sales Product
        columnsTo:
          - Product ID
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom:
          - Sales Employee
        columnsTo:
          - Employee ID
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom:
          - Sales YM
        columnsTo:
          - Year Month
      # Secondary join: Sales → Calendar (by exact date)
      - joinType: many-to-one
        joinTo: Calendar
        secondary: true
        pathName: sales_date
        columnsFrom:
          - Sales Date
        columnsTo:
          - Calendar Date

  Returns:
    code: returns
    database: postgres
    schema: orionbelt_1
    columns:
      Return ID:
        code: return_id
        abstractType: string
      Return Sales ID:
        code: return_sales_id
        abstractType: string
      Return Date:
        code: return_date
        abstractType: date
      Return YM:
        code: return_ym
        abstractType: string
      Return Employee:
        code: return_emp_id
        abstractType: string
      Return Quantity:
        code: return_quantity
        abstractType: int
        numClass: additive
      Return Amount:
        code: return_amount
        abstractType: float
        numClass: additive
      Return Notes:
        code: notes
        abstractType: string
    joins:
      - joinType: many-to-one
        joinTo: Sales
        columnsFrom:
          - Return Sales ID
        columnsTo:
          - Sales ID
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom:
          - Return Employee
        columnsTo:
          - Employee ID
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom:
          - Return YM
        columnsTo:
          - Year Month

  Shipments:
    code: shipments
    database: postgres
    schema: orionbelt_1
    columns:
      Shipment ID:
        code: shipment_id
        abstractType: string
      Shipment Sales ID:
        code: shipment_sales_id
        abstractType: string
      Shipment Date:
        code: shipment_date
        abstractType: date
      Shipment YM:
        code: shipment_ym
        abstractType: string
      Shipment Product:
        code: shipment_product
        abstractType: string
      Shipment Employee:
        code: shipment_emp_id
        abstractType: string
      Shipment Quantity:
        code: shipment_quantity
        abstractType: int
        numClass: additive
      Shipment Amount:
        code: shipment_amount
        abstractType: float
        numClass: additive
      Shipment Notes:
        code: notes
        abstractType: string
    joins:
      - joinType: many-to-one
        joinTo: Sales
        columnsFrom:
          - Shipment Sales ID
        columnsTo:
          - Sales ID
      - joinType: many-to-one
        joinTo: Products
        columnsFrom:
          - Shipment Product
        columnsTo:
          - Product ID
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom:
          - Shipment Employee
        columnsTo:
          - Employee ID
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom:
          - Shipment YM
        columnsTo:
          - Year Month

  Purchases:
    code: purchases
    database: postgres
    schema: orionbelt_1
    columns:
      Purchase ID:
        code: purchase_id
        abstractType: string
      Purchase Date:
        code: purchase_date
        abstractType: date
      Purchase YM:
        code: purchase_ym
        abstractType: string
      Purchase Product ID:
        code: purchase_product_id
        abstractType: string
      Purchase Employee:
        code: purchase_emp_id
        abstractType: string
      Purchase Supplier:
        code: purchase_supplier
        abstractType: string
      Purchase Quantity:
        code: purchase_quantity
        abstractType: float
        numClass: additive
      Purchase Price:
        code: purchase_price
        abstractType: float
        numClass: non-additive
    joins:
      - joinType: many-to-one
        joinTo: Products
        columnsFrom:
          - Purchase Product ID
        columnsTo:
          - Product ID
      - joinType: many-to-one
        joinTo: Employees
        columnsFrom:
          - Purchase Employee
        columnsTo:
          - Employee ID
      - joinType: many-to-one
        joinTo: Suppliers
        columnsFrom:
          - Purchase Supplier
        columnsTo:
          - Supplier ID
      - joinType: many-to-one
        joinTo: Calendar
        columnsFrom:
          - Purchase YM
        columnsTo:
          - Year Month

# ── Dimensions ─────────────────────────────────────────────────────

dimensions:
  # ── Sales fact-table dimensions (on the fact table itself) ─────────
  Sales Date:
    dataObject: Sales
    column: Sales Date
    resultType: date
  Payment Type:
    dataObject: Sales
    column: Sales Payment Type
    resultType: string

  # ── Calendar — role-playing by fact table ─────────────────────────
  Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Sales
  Weekday:
    dataObject: Calendar
    column: Weekday
    resultType: string
    via: Sales
  Return Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Returns
  Shipment Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Shipments
  Purchase Year Month:
    dataObject: Calendar
    column: Year Month
    resultType: string
    via: Purchases

  # ── Client / Country (child of Sales only — no via needed) ────────
  Client Name:
    dataObject: Clients
    column: Client Name
    resultType: string
  Client Gender:
    dataObject: Clients
    column: Client Gender
    resultType: string
  Country Name:
    dataObject: Countries
    column: Country Name
    resultType: string

  # ── Product — role-playing by fact table ──────────────────────────
  Product Name:
    dataObject: Products
    column: Product Name
    resultType: string
    via: Sales
  Product Category:
    dataObject: Products
    column: Product Category
    resultType: string
    via: Sales
  Purchase Product Name:
    dataObject: Products
    column: Product Name
    resultType: string
    via: Purchases
  Purchase Product Category:
    dataObject: Products
    column: Product Category
    resultType: string
    via: Purchases
  Shipment Product Name:
    dataObject: Products
    column: Product Name
    resultType: string
    via: Shipments

  # ── Employee — role-playing by fact table ─────────────────────────
  Employee Name:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Sales
  Department:
    dataObject: Employees
    column: Department Name
    resultType: string
    via: Sales
  Return Employee:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Returns
  Shipment Employee:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Shipments
  Purchase Employee:
    dataObject: Employees
    column: Employee Name
    resultType: string
    via: Purchases
  Purchase Department:
    dataObject: Employees
    column: Department Name
    resultType: string
    via: Purchases

  # ── Supplier — role-playing by fact table ─────────────────────────
  Supplier Name:
    dataObject: Suppliers
    column: Supplier Name
    resultType: string
    via: Sales
  Purchase Supplier:
    dataObject: Suppliers
    column: Supplier Name
    resultType: string
    via: Purchases

# ── Measures ───────────────────────────────────────────────────────

measures:
  Total Sales:
    columns:
      - dataObject: Sales
        column: Sales Amount
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"

  Electronics Sales:
    columns:
      - dataObject: Sales
        column: Sales Amount
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    filters:
      - column: { dataObject: Products, column: Product Category }
        operator: equals
        values: [{ dataType: string, valueString: "Electronics" }]
    description: Total sales filtered to Electronics category

  Sales Count:
    columns:
      - dataObject: Sales
        column: Sales ID
    resultType: int
    aggregation: count
    distinct: true
    format: "#,##0"

  Total Sales Qty:
    columns:
      - dataObject: Sales
        column: Sales Quantity
    resultType: int
    aggregation: sum
    format: "#,##0"

  Total Returns:
    columns:
      - dataObject: Returns
        column: Return Amount
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"

  Return Count:
    columns:
      - dataObject: Sales
        column: Sales ID
      - dataObject: Returns
        column: Return ID
    resultType: int
    aggregation: count
    distinct: true
    format: "#,##0"

  Total Shipments:
    columns:
      - dataObject: Shipments
        column: Shipment Amount
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"

  Total Shipment Qty:
    columns:
      - dataObject: Shipments
        column: Shipment Quantity
    resultType: int
    aggregation: sum
    format: "#,##0"

  Total Purchases:
    columns:
      - dataObject: Purchases
        column: Purchase Price
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"

  Total Purchase Qty:
    columns:
      - dataObject: Purchases
        column: Purchase Quantity
    resultType: float
    aggregation: sum
    format: "#,##0.00"

  Grand Total Sales:
    columns:
      - dataObject: Sales
        column: Sales Amount
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    grain:
      mode: FIXED
    description: Grand total of all sales (ignores GROUP BY dimensions)

  Sales by Country:
    columns:
      - dataObject: Sales
        column: Sales Amount
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    grain:
      mode: FIXED
      include: [Country Name]
    description: Sales aggregated at country level only

  Unfiltered Sales:
    columns:
      - dataObject: Sales
        column: Sales Amount
    resultType: float
    aggregation: sum
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    grain:
      mode: FIXED
    filterContext:
      mode: FIXED
    description: Grand total ignoring all query filters

# ── Metrics (cross-fact) ───────────────────────────────────────────

metrics:
  Return Rate:
    expression: "{[Total Returns]} / {[Total Sales]}"
    dataType: "decimal(5, 4)"
    format: "0.00%"

  Average Sale:
    expression: "{[Total Sales]} / {[Sales Count]}"
    dataType: "decimal(18, 2)"
    format: "#,##0.00"

  Electronics Share:
    expression: "{[Electronics Sales]} / {[Total Sales]}"
    dataType: "decimal(5, 4)"
    format: "0.00%"

  Pct of Total:
    expression: "{[Total Sales]} / {[Grand Total Sales]}"
    dataType: "decimal(5, 4)"
    format: "0.00%"
    description: Sales as percentage of grand total

  Pct of Country:
    expression: "{[Total Sales]} / {[Sales by Country]}"
    dataType: "decimal(5, 4)"
    format: "0.00%"
    description: Sales as percentage of country total

  Running Total Sales:
    type: cumulative
    measure: Total Sales
    timeDimension: Sales Date
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    description: Running total of sales over time

  Rolling 3m Sales:
    type: cumulative
    measure: Total Sales
    timeDimension: Sales Date
    cumulativeType: sum
    window: 3
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    description: 3-month rolling sum of sales

  Sales MoM Change:
    type: period_over_period
    expression: "{[Total Sales]}"
    periodOverPeriod:
      timeDimension: Sales Date
      grain: month
      offsetGrain: month
      comparison: difference
    dataType: "decimal(18, 2)"
    format: "#,##0.00"
    description: Month-over-month sales change
