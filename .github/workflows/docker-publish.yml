name: Docker Publish

# Build and push the three OrionBelt Semantic Layer images to Docker Hub.
# Runs on version tags (the release flow pushes a `vX.Y.Z` tag, which is what
# triggers this) and can be dispatched manually. Published images do NOT bake
# the demo DuckDB seed (that lives only in the Cloud Run build); they ship
# ready to be pointed at a real database via env vars.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: orionbelt-semantic-layer-api
            dockerfile: Dockerfile
            title: OrionBelt Semantic Layer (API)
            description: REST API for the OrionBelt semantic layer engine.
            port: 8080
            health_path: /health
          - image: orionbelt-semantic-layer-flight
            dockerfile: Dockerfile.flight
            title: OrionBelt Semantic Layer (Flight SQL)
            description: REST API + Arrow Flight SQL for the OrionBelt semantic layer engine.
            port: 8080
            health_path: /health
          - image: orionbelt-semantic-layer-ui
            dockerfile: Dockerfile.ui
            title: OrionBelt Semantic Layer (UI)
            description: Gradio playground UI for the OrionBelt semantic layer engine.
            port: 7860
            health_path: /
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only the API image bakes the demo dataset (see Dockerfile). The .duckdb
      # seed is gitignored and regenerated here so a clean checkout can build it;
      # the UI and Flight images do not need it.
      - name: Set up uv
        if: matrix.image == 'orionbelt-semantic-layer-api'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Generate demo DuckDB seed
        if: matrix.image == 'orionbelt-semantic-layer-api'
        run: uv run --no-project --with duckdb python scripts/build_demo_duckdb.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # On a release the version comes from the git tag (type=semver). A manual
      # workflow_dispatch has no version tag, so derive it from pyproject.toml
      # and publish the same semver set + latest. Lets a manual run seed the
      # image repos with a proper versioned baseline (not just a floating tag).
      - name: Read project version
        id: ver
        run: |
          V=$(grep '^version' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "v=$V"           >> "$GITHUB_OUTPUT"
          echo "mm=${V%.*}"     >> "$GITHUB_OUTPUT"
          echo "m=${V%%.*}"     >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.ver.outputs.v }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ steps.ver.outputs.mm }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ steps.ver.outputs.m }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}

      # Prove the container boots BEFORE anything reaches Docker Hub.
      #
      # 2.22.0 published a UI image that exit(1)'d on startup: the build
      # succeeded, the push succeeded, and nothing ever ran it. A green publish
      # meant nothing. buildx cannot `load` a multi-arch build, so build amd64
      # only here (the runner is amd64), smoke it, then let the push step below
      # reuse the layers from the gha cache.
      - name: Build amd64 locally for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          provenance: false
          sbom: false
          tags: smoke-target:${{ matrix.image }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Smoke test - container starts and serves its health path
        run: |
          set -u
          docker run -d --name smoke -p 18080:${{ matrix.port }} smoke-target:${{ matrix.image }}
          for i in $(seq 1 60); do
            if curl -fsS "http://localhost:18080${{ matrix.health_path }}" >/dev/null 2>&1; then
              echo "OK: ${{ matrix.image }} served ${{ matrix.health_path }} after ${i}s"
              docker rm -f smoke >/dev/null
              exit 0
            fi
            if [ "$(docker inspect -f '{{.State.Status}}' smoke)" != "running" ]; then
              echo "FAIL: ${{ matrix.image }} exited before serving a request"
              docker logs smoke
              docker rm -f smoke >/dev/null
              exit 1
            fi
            sleep 2
          done
          echo "FAIL: ${{ matrix.image }} never served ${{ matrix.health_path }} within 120s"
          docker logs smoke
          docker rm -f smoke >/dev/null
          exit 1

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Sync README to Docker Hub overview
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          short-description: ${{ matrix.description }}
          readme-filepath: ./README.md
