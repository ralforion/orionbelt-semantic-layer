name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run tests
        run: uv run pytest --tb=short -q

      # The osi-orionbelt workspace member has its own test suite and pytest
      # config; the root testpaths do not include it, so run it explicitly.
      - name: Run osi-orionbelt tests
        working-directory: packages/osi-orionbelt
        run: uv run pytest --tb=short -q

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      # Coverage floor for the core engine packages. Baselines were measured
      # at compiler+parser+api 85% and osi-orionbelt 82%; the floors sit just
      # below to catch accidental test loss without blocking refactors. Raise
      # them as coverage improves.
      - name: Coverage (compiler / parser / api)
        run: >
          uv run pytest -q
          --cov=orionbelt.compiler --cov=orionbelt.parser --cov=orionbelt.api
          --cov-report=term-missing --cov-fail-under=83

      - name: Coverage (osi-orionbelt)
        working-directory: packages/osi-orionbelt
        run: >
          uv run pytest -q
          --cov=osi_orionbelt --cov-report=term-missing --cov-fail-under=80

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Ruff check
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/

      # The osi-orionbelt workspace member has its own ruff/mypy config; run
      # them from its directory so those (non-strict) settings apply.
      - name: Ruff check osi-orionbelt
        working-directory: packages/osi-orionbelt
        run: uv run ruff check .

      - name: Ruff format check osi-orionbelt
        working-directory: packages/osi-orionbelt
        run: uv run ruff format --check .

      - name: Mypy osi-orionbelt
        working-directory: packages/osi-orionbelt
        run: uv run mypy src/osi_orionbelt
