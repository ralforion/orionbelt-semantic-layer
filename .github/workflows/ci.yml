name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run tests
        run: uv run pytest --tb=short -q

      # The osi-orionbelt workspace member has its own test suite and pytest
      # config; the root testpaths do not include it, so run it explicitly.
      - name: Run osi-orionbelt tests
        working-directory: packages/osi-orionbelt
        run: uv run pytest --tb=short -q

      # Driver workspace members (drivers/*) also sit outside the root
      # testpaths and carry duplicate test-module basenames across packages
      # (e.g. several test_driver.py), so a root-level collection errors on the
      # name clashes. Run each package's suite from its own directory instead,
      # same as osi-orionbelt. Exit code 5 = "no tests collected" is treated as
      # success so a driver without tests (e.g. ob-bigquery) doesn't fail CI.
      - name: Run driver test suites
        run: |
          rc=0
          for d in drivers/*/; do
            [ -d "${d}tests" ] || continue
            echo "::group::${d}"
            (cd "$d" && uv run pytest --tb=short -q)
            code=$?
            echo "::endgroup::"
            if [ "$code" -ne 0 ] && [ "$code" -ne 5 ]; then rc=1; fi
          done
          exit $rc

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      # Coverage floor for the core engine packages. Baselines were measured
      # at compiler+parser+api 85% and osi-orionbelt 82%; the floors sit just
      # below to catch accidental test loss without blocking refactors. Raise
      # them as coverage improves.
      - name: Coverage (compiler / parser / api)
        run: >
          uv run pytest -q
          --cov=orionbelt.compiler --cov=orionbelt.parser --cov=orionbelt.api
          --cov-report=term-missing --cov-fail-under=83

      - name: Coverage (osi-orionbelt)
        working-directory: packages/osi-orionbelt
        run: >
          uv run pytest -q
          --cov=osi_orionbelt --cov-report=term-missing --cov-fail-under=80

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Ruff check
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/

      # The osi-orionbelt workspace member has its own ruff/mypy config; run
      # them from its directory so those (non-strict) settings apply.
      - name: Ruff check osi-orionbelt
        working-directory: packages/osi-orionbelt
        run: uv run ruff check .

      - name: Ruff format check osi-orionbelt
        working-directory: packages/osi-orionbelt
        run: uv run ruff format --check .

      - name: Mypy osi-orionbelt
        working-directory: packages/osi-orionbelt
        run: uv run mypy src/osi_orionbelt

  # Import the UI against the dependency set the UI image actually ships.
  #
  # The `test` job installs --all-extras --all-groups, which pulls
  # mkdocs-material (docs) and with it `requests`. The UI image installs
  # `--no-dev --extra ui` and gets neither, so a gradio that imports requests
  # from its __init__ passes every other job here and still exits(1) on
  # startup. That shipped: 2.22.0's UI image could not boot. This job is the
  # only one that resolves the same set the container does.
  ui-shipped-deps:
    name: UI imports on shipped deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # Match the UI image base (Dockerfile.ui).
      - name: Install Python
        run: uv python install 3.14

      # Mirrors Dockerfile.ui's install line exactly.
      - name: Install the shipped UI dependency set
        env:
          UV_PROJECT_ENVIRONMENT: /tmp/ui-venv
        run: uv sync --no-dev --extra ui --no-editable --frozen

      - name: Import gradio and the UI entrypoint
        run: |
          /tmp/ui-venv/bin/python -c "import gradio; print('gradio', gradio.__version__)"
          /tmp/ui-venv/bin/python -c "from orionbelt.ui.app import main; print('UI entrypoint imports OK')"
